<style>
:root {
  /* Paleta Carmelita */
  --brown:       #7A3C18;   /* Marrón hábito carmelita */
  --brown-dark:  #4A1E08;   /* Marrón oscuro / espresso */
  --brown-mid:   #A05828;   /* Marrón cobrizo */
  --brown-light: #F6EDE4;   /* Arena cálida */
  --gold:        #C49A2A;   /* Oro ocre */
  --gold-light:  #E8C97A;   /* Miel dorada */
  --gold-bright: #F2D96A;   /* Estrella dorada */
  --cream:       #FFFBF4;   /* Crema cálida */
  --ink:         #1A0A00;   /* Tinta marrón oscuro */
  --ink-soft:    #6B4A28;   /* Marrón suave */
  --border:      #E0CCBA;   /* Borde cálido */
  --border-mid:  #C9A888;   /* Borde medio */
  --bg:          #FFFFFF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

/* ─── HEADER ─── */
header {
  background: linear-gradient(160deg, var(--brown-dark) 0%, #6B3010 60%, var(--brown) 100%);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 3px 28px rgba(74,30,8,0.6);
}

.header-gold-bar {
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold) 15%, var(--gold-bright) 50%, var(--gold) 85%, transparent);
}

.header-body {
  display: flex;
  align-items: center;
  padding: clamp(0.6rem, 2vw, 0.9rem) clamp(1rem, 4vw, 1.8rem);
  gap: clamp(0.75rem, 2.5vw, 1.1rem);
}

.header-logo {
  flex-shrink: 0;
  width: clamp(42px, 9vw, 56px);
  height: clamp(42px, 9vw, 56px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid rgba(196,154,42,0.55);
  background: rgba(0,0,0,0.22);
  box-shadow: 0 0 0 4px rgba(196,154,42,0.1), 0 2px 10px rgba(0,0,0,0.3);
  overflow: hidden;
}
.header-logo svg { width: 100%; height: 100%; }

.header-title-group { flex: 1; min-width: 0; }

.h-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1rem, 4vw, 1.35rem);
  font-weight: 700;
  letter-spacing: 0.04em;
  color: #fff;
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.h-title .accent { color: var(--gold-light); }

.h-sub {
  font-family: 'EB Garamond', serif;
  font-size: clamp(0.6rem, 2vw, 0.72rem);
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 0.12rem;
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ─── SEARCH ─── */
.search-wrap {
  background: linear-gradient(180deg, #3e1806 0%, #2c1004 100%);
  padding: clamp(0.5rem, 1.5vw, 0.65rem) clamp(1rem, 4vw, 1.8rem);
  position: sticky;
  z-index: 99;
  border-bottom: 1px solid rgba(196,154,42,0.18);
}

.search-inner {
  position: relative;
  max-width: 640px;
  margin: 0 auto;
}

.search-icon {
  position: absolute;
  left: 0.95rem; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.38);
  font-size: 1rem;
  pointer-events: none;
  line-height: 1;
}

.search-wrap input {
  width: 100%;
  padding: clamp(0.55rem, 1.5vw, 0.68rem) 1rem clamp(0.55rem, 1.5vw, 0.68rem) 2.6rem;
  border-radius: 30px;
  border: 1.5px solid rgba(196,154,42,0.22);
  background: rgba(255,255,255,0.07);
  color: #fff;
  font-family: 'EB Garamond', serif;
  font-size: clamp(1rem, 2.5vw, 1.08rem);
  outline: none;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.32); font-style: italic; }
.search-wrap input:focus {
  background: rgba(255,255,255,0.11);
  border-color: rgba(196,154,42,0.5);
  box-shadow: 0 0 0 3px rgba(196,154,42,0.1);
}

/* ─── MAIN ─── */
main {
  max-width: 800px;
  margin: 0 auto;
  padding: clamp(1.1rem, 3vw, 2rem) clamp(0.85rem, 4vw, 1.6rem) 5rem;
}

/* ─── BANNER DECORATIVO ─── */
.carmel-banner {
  text-align: center;
  padding: clamp(1rem, 3vw, 1.5rem) 1rem clamp(0.9rem, 2.5vw, 1.3rem);
  margin-bottom: clamp(0.5rem, 2vw, 1rem);
  background: linear-gradient(135deg, var(--brown-dark) 0%, #6B3010 50%, var(--brown) 100%);
  border-radius: 14px;
  box-shadow: 0 4px 20px rgba(74,30,8,0.22), inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}
.carmel-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 30px,
    rgba(196,154,42,0.03) 30px,
    rgba(196,154,42,0.03) 32px
  );
  pointer-events: none;
}
.banner-stars {
  font-size: clamp(0.65rem, 1.8vw, 0.85rem);
  color: var(--gold);
  letter-spacing: 0.6em;
  opacity: 0.7;
  margin-bottom: 0.35rem;
  display: block;
}
.banner-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.9rem, 3.5vw, 1.2rem);
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.06em;
  line-height: 1.25;
  margin-bottom: 0.25rem;
}
.banner-subtitle {
  font-family: 'EB Garamond', serif;
  font-size: clamp(0.75rem, 2vw, 0.9rem);
  color: var(--gold-light);
  font-style: italic;
  letter-spacing: 0.06em;
  opacity: 0.85;
}
.banner-rule {
  width: clamp(60px, 20vw, 100px);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0.5rem auto 0;
  opacity: 0.5;
}

/* ─── SECTION LABEL ─── */
.sec-label {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: clamp(0.65rem, 2vw, 1rem);
}
.sec-label-text {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-soft);
  white-space: nowrap;
}
.sec-label-rule {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border-mid), transparent);
}
.sec-label-count {
  font-family: 'EB Garamond', serif;
  font-size: 0.85rem;
  color: var(--ink-soft);
  opacity: 0.6;
  font-style: italic;
  white-space: nowrap;
}

/* ─── CATEGORY GRID ─── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(0.45rem, 1.5vw, 0.65rem);
  margin-bottom: clamp(1.4rem, 4vw, 2.2rem);
}

.cat-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.3rem;
  padding: clamp(0.85rem, 2.5vw, 1.1rem) 0.35rem clamp(0.75rem, 2vw, 0.9rem);
  min-height: clamp(80px, 18vw, 100px);
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.17s ease;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.cat-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, var(--brown-light) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.17s;
}
.cat-btn:hover::before { opacity: 1; }

.cat-btn::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--brown), var(--gold));
  transform: scaleX(0);
  transition: transform 0.2s ease;
  transform-origin: center;
  border-radius: 0 0 2px 2px;
}

.cat-btn:hover {
  border-color: var(--brown-mid);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(74,30,8,0.14);
}
.cat-btn:hover::after { transform: scaleX(1); }
.cat-btn:active { transform: translateY(0); transition-duration: 0.06s; }

.cat-btn.active {
  background: linear-gradient(145deg, var(--brown-dark) 0%, var(--brown) 100%);
  border-color: var(--brown-dark);
  transform: translateY(-1px);
  box-shadow: 0 6px 22px rgba(74,30,8,0.42);
}
.cat-btn.active::before { opacity: 0; }
.cat-btn.active::after {
  background: linear-gradient(90deg, var(--gold), var(--gold-bright), var(--gold));
  transform: scaleX(1);
}

.cat-icon {
  font-size: clamp(1.5rem, 4.5vw, 1.9rem);
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.1));
}

.cat-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.58rem, 1.6vw, 0.68rem);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--brown);
  text-align: center;
  line-height: 1.25;
  padding: 0 2px;
}
.cat-btn.active .cat-label { color: rgba(255,255,255,0.95); }

.cat-count {
  font-size: clamp(0.62rem, 1.5vw, 0.72rem);
  color: var(--ink-soft);
  opacity: 0.45;
  font-family: 'EB Garamond', serif;
  font-style: italic;
}
.cat-btn.active .cat-count { color: rgba(255,255,255,0.6); opacity: 1; }

/* ─── SONGS LIST ─── */
.songs-list {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(74,30,8,0.06), 0 8px 28px rgba(74,30,8,0.06);
  margin-bottom: 1.5rem;
}

.song-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: clamp(0.8rem, 2.5vw, 1rem) clamp(1rem, 3vw, 1.25rem);
  min-height: clamp(56px, 12vw, 64px);
  border-bottom: 1px solid rgba(224,204,186,0.5);
  text-decoration: none;
  color: var(--ink);
  transition: background 0.12s, border-left-color 0.15s;
  border-left: 4px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.song-row:last-child { border-bottom: none; }
.song-row:hover {
  background: var(--brown-light);
  border-left-color: var(--gold);
}

.song-tag {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.52rem, 1.4vw, 0.6rem);
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--brown-mid);
  background: var(--brown-light);
  border: 1px solid rgba(122,60,24,0.18);
  border-radius: 4px;
  padding: 3px 7px 2px;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 1.6;
}

.song-name {
  flex: 1;
  font-family: 'EB Garamond', serif;
  font-size: clamp(1.05rem, 2.8vw, 1.12rem);
  line-height: 1.3;
  color: var(--ink);
  min-width: 0;
}

.song-arrow {
  color: var(--border-mid);
  font-size: clamp(1.1rem, 3vw, 1.3rem);
  flex-shrink: 0;
  transition: transform 0.13s, color 0.13s;
  line-height: 1;
}
.song-row:hover .song-arrow { transform: translateX(4px); color: var(--gold); }

/* ─── NO RESULTS ─── */
.no-results {
  display: none;
  text-align: center;
  padding: 4rem 1.5rem;
  font-family: 'EB Garamond', serif;
  font-style: italic;
  color: var(--ink-soft);
  font-size: 1.08rem;
}
.no-results-icon {
  display: block;
  font-size: 2.8rem;
  margin-bottom: 0.9rem;
  opacity: 0.28;
  font-style: normal;
}

/* ─── FOOTER ─── */
footer {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
  border-top: 1px solid var(--border);
}
.footer-ornament {
  font-size: 0.72rem;
  color: var(--gold);
  letter-spacing: 0.55em;
  opacity: 0.55;
  margin-bottom: 0.4rem;
}
.footer-text {
  font-family: 'EB Garamond', serif;
  font-size: 0.8rem;
  color: var(--ink-soft);
  opacity: 0.5;
  font-style: italic;
  letter-spacing: 0.03em;
}

/* ─── RESPONSIVE: md — tablet ─── */
@media (min-width: 520px) {
  .cat-grid { grid-template-columns: repeat(4, 1fr); }
}

/* ─── RESPONSIVE: lg — desktop ─── */
@media (min-width: 720px) {
  .cat-grid { grid-template-columns: repeat(5, 1fr); }
  .cat-btn { min-height: 92px; }
  main { padding: 2rem 2rem 5rem; }
  .carmel-banner { border-radius: 16px; }
  .songs-list { border-radius: 18px; }
}

/* ─── RESPONSIVE: xl ─── */
@media (min-width: 960px) {
  main { max-width: 960px; }
  .cat-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.carmel-banner { animation: fadeUp 0.28s ease both; }
.cat-grid      { animation: fadeUp 0.3s ease 0.05s both; }
.songs-list    { animation: fadeUp 0.32s ease 0.1s both; }
</style>
</head>

const CATS = [
  ["entrada","Entrada","🚪"], ["gloria","Gloria / Kyrie","✨"], ["aleluya","Aleluya","🎶"],
  ["ofertorio","Ofrenda","🌾"], ["santo","Santo / Cordero","🔔"], ["comunion","Comunión","✝️"],
  ["adoracion","Adoración","🙏"], ["marianos","A María","🌹"], ["carmelitanos","Carmelitanos","📜"],
  ["sanjose","San José","⚒️"], ["adviento","Adviento","🕯️"], ["navidad","Navidad","⭐"],
  ["cuaresma","Cuaresma","🏜️"], ["pascua","Pascua","🕊️"], ["varias","Varios","🎵"]
];
const CMAP = Object.fromEntries(CATS.map(([id,label]) => [id, label]));

function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}

let af = null;

function renderCats() {
  document.getElementById('cg').innerHTML = CATS.map(([id, label, icon]) => {
    const n = SONGS.filter(s => s.category === id).length;
    if (!n) return '';
    return `<button class="cat-btn${af === id ? ' active' : ''}" onclick="fc('${id}')">
      <span class="cat-icon">${icon}</span>
      <span class="cat-label">${label}</span>
      <span class="cat-count">${n} canc.</span>
    </button>`;
  }).join('');
}

function renderList(songs) {
  const list = document.getElementById('list');
  document.getElementById('cnt').textContent = songs.length + ' canciones';
  if (!songs.length) {
    list.style.display = 'none';
    document.getElementById('nr').style.display = 'block';
    document.getElementById('nrt').textContent = document.getElementById('si').value;
    return;
  }
  list.style.display = 'block';
  document.getElementById('nr').style.display = 'none';
  list.innerHTML = songs.map(s => `<a class="song-row" href="cancion.html?id=${s.id}">
    <span class="song-tag">${CMAP[s.category] || s.category}</span>
    <span class="song-name">${s.title}</span>
    <span class="song-arrow">›</span>
  </a>`).join('');
}

function fc(id) {
  af = af === id ? null : id;
  document.getElementById('si').value = '';
  renderCats();
  renderList(af ? SONGS.filter(s => s.category === af) : SONGS);
  if (af) document.getElementById('list').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('si').addEventListener('input', function () {
  const q = normalize(this.value.trim());
  af = null; renderCats();
  renderList(q ? SONGS.filter(s => normalize(s.title).includes(q)) : SONGS);
});

/* Sticky search flush below header */
(function () {
  const sw = document.getElementById('searchWrap');
  function pos() { sw.style.top = document.querySelector('header').offsetHeight + 'px'; }
  pos();
  window.addEventListener('resize', pos);
})();

renderCats();
renderList(SONGS);
</script>
