<title>Cancionero — Coro Santa María del Carmen</title>
<style>
:root{--wine:#6B2D1F;--wine-d:#4d1e13;--wine-m:#8B3A28;--wine-l:#f7eeeb;--gold:#b8952a;--border:#e5d5ce;--bg:#fff;--bg2:#faf6f4;--muted:#7a6a60}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg2);color:#1a1208;min-height:100vh}
header{background:var(--wine);color:#fff;padding:.95rem 1.1rem .85rem;text-align:center;position:sticky;top:0;z-index:100;border-bottom:2.5px solid var(--gold)}
.h-title{font-size:1.2rem;font-weight:600;letter-spacing:.02em}
.h-sub{font-size:.68rem;color:rgba(255,255,255,.6);letter-spacing:.13em;text-transform:uppercase;margin-top:.2rem}
.sw{background:var(--wine-d);padding:.6rem .9rem;position:sticky;top:63px;z-index:99}
.sw input{width:100%;padding:.52rem .95rem;border-radius:20px;border:none;background:rgba(255,255,255,.13);color:#fff;font-size:.88rem;outline:none;transition:background .2s}
.sw input::placeholder{color:rgba(255,255,255,.45)}
.sw input:focus{background:rgba(255,255,255,.22)}
main{max-width:840px;margin:0 auto;padding:1.1rem .85rem 3rem}
.sl{font-size:.67rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.55rem;padding-bottom:.32rem;border-bottom:1px solid var(--border)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:.55rem;margin-bottom:1.5rem}
.cb{display:flex;flex-direction:column;align-items:center;gap:.3rem;padding:.65rem .35rem;background:var(--bg);border-radius:8px;cursor:pointer;color:var(--wine);font-size:.7rem;text-align:center;letter-spacing:.04em;text-transform:uppercase;font-weight:600;transition:all .13s;line-height:1.2;border:1px solid var(--border)}
.cb:hover{background:var(--wine-l);border-color:var(--wine-m)}
.cb.on{background:var(--wine);color:#fff;border-color:var(--wine)}
.ci{font-size:1.2rem}
.sl2{display:flex;justify-content:space-between;align-items:center;margin-bottom:.55rem;padding-bottom:.32rem;border-bottom:1px solid var(--border)}
.sl2 span{font-size:.67rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.list{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
.sr{display:flex;align-items:center;gap:.65rem;padding:.6rem .85rem;text-decoration:none;color:#1a1208;font-size:.86rem;border-bottom:1px solid var(--border);transition:background .1s}
.sr:last-child{border-bottom:none}
.sr:hover{background:var(--wine-l)}
.sn{font-size:.65rem;color:var(--muted);min-width:22px;text-align:right;flex-shrink:0}
.st{font-size:.62rem;letter-spacing:.05em;text-transform:uppercase;color:var(--wine-m);background:var(--wine-l);border-radius:3px;padding:2px 5px;white-space:nowrap;flex-shrink:0;border:1px solid rgba(107,45,31,.14)}
.sname{flex:1;line-height:1.3}
.ar{color:var(--border);font-size:.72rem;flex-shrink:0}
.nr{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.87rem;display:none}
footer{text-align:center;padding:1.5rem 1rem;font-size:.72rem;color:var(--muted);border-top:1px solid var(--border)}
@media(max-width:420px){.cg{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<header>
  <div class="h-title">✝ Cancionero</div>
  <div class="h-sub">Coro Santa María del Carmen · Córdoba</div>

</main>
<footer>Coro Santa María del Carmen · Parroquia del Carmen · Córdoba, Argentina</footer>

const CATS=[["entrada", "Entrada", "🚪"], ["gloria", "Gloria / Kyrie", "✨"], ["aleluya", "Aleluya", "🎶"], ["ofertorio", "Ofrenda", "🌾"], ["santo", "Santo / Cordero", "🔔"], ["comunion", "Comunión", "✝️"], ["adoracion", "Adoración", "🙏"], ["marianos", "A María", "🌹"], ["carmelitanos", "Carmelitanos", "📜"], ["sanjose", "San José", "⚒️"], ["adviento", "Adviento", "🕯️"], ["navidad", "Navidad", "⭐"], ["cuaresma", "Cuaresma", "🏜️"], ["pascua", "Pascua", "🕊️"], ["varias", "Varios", "🎵"]];
const CMAP={"entrada": "Entrada", "gloria": "Gloria / Kyrie", "aleluya": "Aleluya", "ofertorio": "Ofrenda", "santo": "Santo / Cordero", "comunion": "Comunión", "adoracion": "Adoración", "marianos": "A María", "carmelitanos": "Carmelitanos", "sanjose": "San José", "adviento": "Adviento", "navidad": "Navidad", "cuaresma": "Cuaresma", "pascua": "Pascua", "varias": "Varios"};
let af=null;
function renderCats(){
  document.getElementById('cg').innerHTML=CATS.map(([id,label,icon])=>{
    const n=SONGS.filter(s=>s.category===id).length;
    if(!n)return'';
    return`<button class="cb${af===id?' on':''}" onclick="fc('${id}')"><span class="ci">${icon}</span>${label}</button>`;
  }).join('');
}
function renderList(songs){
  const list=document.getElementById('list');
  document.getElementById('cnt').textContent=songs.length+' canciones';
  if(!songs.length){
    list.style.display='none';
    document.getElementById('nr').style.display='block';
    document.getElementById('nrt').textContent=document.getElementById('si').value;
    return;
  }
  list.style.display='block';
  document.getElementById('nr').style.display='none';
  list.innerHTML=songs.map(s=>`<a class="sr" href="canciones/${s.id}.html">
    ${s.num?`<span class="sn">${s.num}</span>`:''}
    <span class="st">${CMAP[s.category]||s.category}</span>
    <span class="sname">${s.title}</span>
    <span class="ar">›</span>
  </a>`).join('');
}
function fc(id){
  af=af===id?null:id;
  document.getElementById('si').value='';
  renderCats();
  renderList(af?SONGS.filter(s=>s.category===af):SONGS);
  if(af)document.getElementById('list').scrollIntoView({behavior:'smooth',block:'start'});
}
document.getElementById('si').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  af=null;renderCats();
  renderList(q?SONGS.filter(s=>s.title.toLowerCase().includes(q)):SONGS);
});
renderCats();
renderList(SONGS);
</script>
