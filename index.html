<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --wine:       #6B2D1F;
  --wine-dark:  #4A1A10;
  --wine-mid:   #8B3A28;
  --wine-light: #F7EEEB;
  --gold:       #B8952A;
  --gold-light: #E8C97A;
  --cream:      #FAF5EF;
  --ink:        #1A0E0A;
  --ink-soft:   #6B5046;
  --border:     #DEC8BE;
  --border-mid: #C9A898;
  --bg:         #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
}

/* ─── HEADER ─── */
header {
  background: linear-gradient(170deg, var(--wine-dark) 0%, var(--wine) 100%);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 18px rgba(74,26,16,0.5);
}
.header-gold-bar {
  height: 2.5px;
  background: linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold-light) 50%, var(--gold) 80%, transparent);
}
.header-body {
  display: flex;
  align-items: center;
  padding: 0.7rem 1rem 0.65rem;
  gap: 0.85rem;
}

/* Logo */
.header-logo {
  flex-shrink: 0;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid rgba(184,149,42,0.45);
  background: rgba(0,0,0,0.2);
  box-shadow: 0 0 0 3px rgba(184,149,42,0.1);
}
.header-logo svg { width: 30px; height: 30px; }

.header-title-group { flex: 1; }
.h-title {
  font-family: 'Cinzel', serif;
  font-size: 1.22rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: #fff;
  line-height: 1.15;
}
.h-title .accent { color: var(--gold-light); }
.h-sub {
  font-family: 'EB Garamond', serif;
  font-size: 0.68rem;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 0.12rem;
  font-style: italic;
}

/* ─── SEARCH ─── */
.search-wrap {
  background: var(--wine-dark);
  padding: 0.5rem 1rem;
  position: sticky;
  z-index: 99;
  border-bottom: 1px solid rgba(184,149,42,0.18);
}
.search-inner { position: relative; max-width: 640px; margin: 0 auto; }
.search-icon {
  position: absolute; left: 0.8rem; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.35); font-size: 0.85rem; pointer-events: none;
}
.search-wrap input {
  width: 100%; padding: 0.5rem 1rem 0.5rem 2.2rem;
  border-radius: 22px; border: 1px solid rgba(184,149,42,0.26);
  background: rgba(255,255,255,0.09); color: #fff;
  font-family: 'EB Garamond', serif; font-size: 1rem; outline: none;
  transition: background 0.2s, border-color 0.2s;
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.36); font-style: italic; }
.search-wrap input:focus { background: rgba(255,255,255,0.15); border-color: rgba(184,149,42,0.52); }

/* ─── MAIN ─── */
main { max-width: 700px; margin: 0 auto; padding: 1.4rem 1rem 5rem; }

/* ─── SECTION LABEL ─── */
.sec-label { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.85rem; }
.sec-label-text {
  font-family: 'Cinzel', serif; font-size: 0.62rem; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); white-space: nowrap;
}
.sec-label-rule { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-mid), transparent); }
.sec-label-count {
  font-family: 'EB Garamond', serif; font-size: 0.8rem;
  color: var(--ink-soft); opacity: 0.65; font-style: italic; white-space: nowrap;
}

/* ─── CATEGORY GRID ─── */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 0.45rem;
  margin-bottom: 1.85rem;
}
.cat-btn {
  display: flex; flex-direction: column; align-items: center;
  gap: 0.25rem; padding: 0.72rem 0.3rem 0.6rem;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer;
  transition: all 0.16s ease; position: relative; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.cat-btn::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--wine), var(--gold));
  transform: scaleX(0); transition: transform 0.18s ease; transform-origin: left;
}
.cat-btn:hover { border-color: var(--wine-mid); background: var(--wine-light); transform: translateY(-2px); box-shadow: 0 3px 10px rgba(107,45,31,0.14); }
.cat-btn:hover::after { transform: scaleX(1); }
.cat-btn.active {
  background: var(--wine); border-color: var(--wine-dark);
  transform: translateY(-1px); box-shadow: 0 4px 14px rgba(74,26,16,0.32);
}
.cat-btn.active::after { background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold)); transform: scaleX(1); }
.cat-icon { font-size: 1.28rem; line-height: 1; }
.cat-label {
  font-family: 'Cinzel', serif; font-size: 0.55rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--wine);
  text-align: center; line-height: 1.3;
}
.cat-btn.active .cat-label { color: rgba(255,255,255,0.9); }
.cat-count { font-size: 0.6rem; color: var(--ink-soft); opacity: 0.42; font-family: 'EB Garamond', serif; }
.cat-btn.active .cat-count { color: rgba(255,255,255,0.5); opacity: 1; }

/* ─── SONGS LIST ─── */
.songs-list {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(107,45,31,0.06), 0 4px 16px rgba(107,45,31,0.03);
  margin-bottom: 1.5rem;
}
.song-row {
  display: flex; align-items: center; gap: 0.65rem;
  padding: 0.65rem 0.9rem;
  border-bottom: 1px solid rgba(222,200,190,0.55);
  text-decoration: none; color: var(--ink);
  transition: background 0.1s, border-left-color 0.14s;
  border-left: 3px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.song-row:last-child { border-bottom: none; }
.song-row:hover { background: var(--wine-light); border-left-color: var(--wine); }
.song-num {
  font-family: 'Cinzel', serif; font-size: 0.59rem;
  color: var(--ink-soft); min-width: 22px; text-align: right;
  flex-shrink: 0; opacity: 0.42;
}
.song-tag {
  font-family: 'Cinzel', serif; font-size: 0.52rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; color: var(--wine-mid);
  background: var(--wine-light); border: 1px solid rgba(107,45,31,0.2);
  border-radius: 3px; padding: 2px 5px; white-space: nowrap; flex-shrink: 0;
}
.song-name { flex: 1; font-family: 'EB Garamond', serif; font-size: 0.97rem; line-height: 1.3; color: var(--ink); }
.song-arrow { color: var(--border-mid); font-size: 0.9rem; flex-shrink: 0; transition: transform 0.12s, color 0.12s; }
.song-row:hover .song-arrow { transform: translateX(2px); color: var(--wine-mid); }

.no-results {
  display: none; text-align: center; padding: 3rem 1rem;
  font-family: 'EB Garamond', serif; font-style: italic;
  color: var(--ink-soft); font-size: 1rem;
}

/* ─── FOOTER ─── */
footer { text-align: center; padding: 1.75rem 1rem 1.25rem; border-top: 1px solid var(--border); }
.footer-ornament { font-size: 0.7rem; color: var(--gold); letter-spacing: 0.5em; opacity: 0.5; margin-bottom: 0.3rem; }
.footer-text { font-family: 'EB Garamond', serif; font-size: 0.75rem; color: var(--ink-soft); opacity: 0.55; font-style: italic; letter-spacing: 0.04em; }

/* ─── RESPONSIVE ─── */
@media (max-width: 440px) {
  .cat-grid { grid-template-columns: repeat(3, 1fr); }
  main { padding: 1.1rem 0.75rem 5rem; }
  .h-title { font-size: 1.08rem; }
  .header-body { padding: 0.6rem 0.85rem; gap: 0.7rem; }
  .header-logo { width: 40px; height: 40px; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.cat-grid   { animation: fadeUp 0.28s ease both; }
.songs-list { animation: fadeUp 0.3s  ease 0.05s both; }
</style>
</head>

const CATS = [
  ["entrada","Entrada","🚪"], ["gloria","Gloria / Kyrie","✨"], ["aleluya","Aleluya","🎶"],
  ["ofertorio","Ofrenda","🌾"], ["santo","Santo / Cordero","🔔"], ["comunion","Comunión","✝️"],
  ["adoracion","Adoración","🙏"], ["marianos","A María","🌹"], ["carmelitanos","Carmelitanos","📜"],
  ["sanjose","San José","⚒️"], ["adviento","Adviento","🕯️"], ["navidad","Navidad","⭐"],
  ["cuaresma","Cuaresma","🏜️"], ["pascua","Pascua","🕊️"], ["varias","Varios","🎵"]
];
const CMAP = Object.fromEntries(CATS.map(([id,label]) => [id, label]));

function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
}

let af = null;

function renderCats() {
  document.getElementById('cg').innerHTML = CATS.map(([id, label, icon]) => {
    const n = SONGS.filter(s => s.category === id).length;
    if (!n) return '';
    return `<button class="cat-btn${af === id ? ' active' : ''}" onclick="fc('${id}')">
      <span class="cat-icon">${icon}</span>
      <span class="cat-label">${label}</span>
      <span class="cat-count">${n}</span>
    </button>`;
  }).join('');
}

function renderList(songs) {
  const list = document.getElementById('list');
  document.getElementById('cnt').textContent = songs.length + ' canciones';
  if (!songs.length) {
    list.style.display = 'none';
    document.getElementById('nr').style.display = 'block';
    document.getElementById('nrt').textContent = document.getElementById('si').value;
    return;
  }
  list.style.display = 'block';
  document.getElementById('nr').style.display = 'none';
  list.innerHTML = songs.map(s => `<a class="song-row" href="cancion.html?id=${s.id}">
    ${s.num ? `<span class="song-num">${s.num}</span>` : ''}
    <span class="song-tag">${CMAP[s.category] || s.category}</span>
    <span class="song-name">${s.title}</span>
    <span class="song-arrow">›</span>
  </a>`).join('');
}

function fc(id) {
  af = af === id ? null : id;
  document.getElementById('si').value = '';
  renderCats();
  renderList(af ? SONGS.filter(s => s.category === af) : SONGS);
  if (af) document.getElementById('list').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('si').addEventListener('input', function () {
  const q = normalize(this.value.trim());
  af = null; renderCats();
  renderList(q ? SONGS.filter(s => normalize(s.title).includes(q)) : SONGS);
});

/* Sticky search flush below header */
(function () {
  const sw = document.getElementById('searchWrap');
  function pos() { sw.style.top = document.querySelector('header').offsetHeight + 'px'; }
  pos();
  window.addEventListener('resize', pos);
})();

renderCats();
renderList(SONGS);
</script>
